name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Install Python dependencies
        run: pip install pyyaml lxml phoebusgen

      - name: Run tests
        run: xvfb-run python -m unittest discover -s tests -v

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate reference docs
        run: cd docs && python make_docs.py

      - name: Verify docs are up to date
        run: |
          git diff --exit-code docs/reference/ || \
          (echo "Generated docs are out of date. Run 'cd docs && python make_docs.py' and commit the results." && exit 1)
